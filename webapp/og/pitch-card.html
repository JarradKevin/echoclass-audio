<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #f4f7f5;
    font-family: "IBM Plex Sans", system-ui, sans-serif;
  }
  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    padding: 76px 84px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 14px; background: #ff6b4a; }
  .brand {
    position: absolute;
    top: 56px;
    left: 84px;
    font-family: "Fraunces", serif;
    font-weight: 600;
    font-size: 1.5rem;
    color: #12211d;
  }
  .brand .dot { color: #ff6b4a; }
  .eyebrow {
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #d6472c;
    font-weight: 600;
    margin-bottom: 22px;
  }
  h1 {
    font-family: "Fraunces", serif;
    font-weight: 600;
    font-size: 4.1rem;
    line-height: 1.08;
    color: #12211d;
    max-width: 920px;
    text-wrap: balance;
  }
  p {
    margin-top: 28px;
    font-size: 1.5rem;
    line-height: 1.5;
    color: #4b5f58;
    max-width: 780px;
  }
  .footer-mark {
    position: absolute;
    bottom: 56px;
    left: 84px;
    font-size: 1.05rem;
    color: #7c928a;
    letter-spacing: 0.02em;
  }
  .footer-mark strong { color: #123f34; }
</style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>
    <div class="brand">Second Look<span class="dot">.</span></div>
    <div class="eyebrow">Pitch Episode — Interview</div>
    <h1>What If Homework Sounded Like This</h1>
    <p>Dev talks to Alex about EchoClass — an interview episode, about seven and a half minutes.</p>
    <div class="footer-mark">An <strong>EchoClass</strong> production</div>
  </div>
</body>
</html>
